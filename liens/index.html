<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --noir:#0D1210;
  --jungle:#192B1D;
  --mousse:#2A4530;
  --feuille:#3D6647;
  --lime:#A8D96C;
  --lime-dim:rgba(168,217,108,0.12);
  --sable:#C8B49A;
  --creme:#EDE8DF;
  --blanc:#F8F6F2;
}
html,body{height:100%;overflow-x:hidden}
body{
  font-family:'Barlow',sans-serif;
  background:var(--noir);
  color:var(--creme);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100dvh;
  position:relative;
}

/* Hero background */
.hero-bg{
  position:fixed;inset:0;z-index:0;
  background-size:cover;
  background-position:center 30%;
  background-repeat:no-repeat;
}
.hero-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(
    180deg,
    rgba(13,18,16,0.6) 0%,
    rgba(13,18,16,0.75) 30%,
    rgba(13,18,16,0.92) 70%,
    rgba(13,18,16,0.98) 100%
  );
}

/* Card */
.card{
  position:relative;z-index:1;
  width:380px;max-width:calc(100vw - 32px);
  padding:40px 28px 32px;
  animation:card-in .7s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity:0;
}
@keyframes card-in{
  from{opacity:0;transform:translateY(24px) scale(0.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* Logo */
.logo-wrap{
  text-align:center;margin-bottom:16px;
  animation:fade-up .6s .15s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0;
}
.logo-wrap img{
  height:100px;width:auto;
  filter:drop-shadow(0 4px 24px rgba(168,217,108,0.15));
}

/* Header */
.card-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2.4rem,8vw,3.2rem);
  letter-spacing:.08em;
  text-align:center;
  color:var(--blanc);
  line-height:1;
  animation:fade-up .6s .25s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0;
}
.card-name span{color:var(--lime)}

.card-sub{
  font-family:'Syne',sans-serif;font-weight:600;
  font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;
  text-align:center;color:var(--lime);margin-top:8px;
  animation:fade-up .6s .35s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0;
}

/* Badge */
.badge{
  display:flex;justify-content:center;gap:16px;
  margin:20px 0 8px;
  animation:fade-up .6s .42s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0;
}
.badge-item{
  font-family:'Syne',sans-serif;font-size:.58rem;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--sable);opacity:.7;
  display:flex;align-items:center;gap:6px;
}
.badge-item::before{
  content:'';width:5px;height:5px;border-radius:50%;
  background:var(--lime);opacity:.5;
}

/* Separator */
.sep{
  display:flex;align-items:center;gap:14px;
  margin:20px 0 24px;
  animation:fade-up .6s .48s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0;
}
.sep-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(168,217,108,0.2),transparent)}
.sep-icon{width:16px;height:16px;opacity:.4}
.sep-icon svg{width:100%;height:100%;fill:var(--lime)}

/* Buttons */
.links{
  display:flex;flex-direction:column;gap:10px;
  animation:fade-up .6s .56s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0;
}
.link-btn{
  display:flex;align-items:center;gap:14px;
  padding:15px 18px;
  background:rgba(25,43,29,0.4);
  border:1px solid rgba(168,217,108,0.1);
  border-left:3px solid transparent;
  text-decoration:none;color:var(--creme);
  position:relative;overflow:hidden;
  transition:all .3s cubic-bezier(0.16,1,0.3,1);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.link-btn:active{
  transform:scale(0.98);
  background:rgba(25,43,29,0.6);
}
.link-btn:hover{
  border-left-color:var(--lime);
  background:rgba(42,69,48,0.4);
  transform:translateX(4px);
}
.link-btn:hover .link-arrow{opacity:1;transform:translateX(0)}

/* CTA principal WhatsApp */
.link-btn.cta-main{
  background:var(--lime);
  border:none;border-left:none;
  color:var(--noir);
  padding:18px;
  justify-content:center;
}
.link-btn.cta-main:hover{
  background:#bfe87a;
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(168,217,108,0.25);
}
.link-btn.cta-main .link-icon{background:rgba(13,18,16,0.15)}
.link-btn.cta-main .link-icon svg{fill:var(--noir)}
.link-btn.cta-main .link-title{color:var(--noir);font-size:.82rem}
.link-btn.cta-main .link-desc{color:rgba(13,18,16,0.6)}

/* Icon circle */
.link-icon{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.link-icon svg{width:18px;height:18px;fill:#fff}
.link-icon.wa{background:linear-gradient(135deg,#25D366,#128C7E)}
.link-icon.web{background:linear-gradient(135deg,var(--lime),var(--feuille))}
.link-icon.ig{background:linear-gradient(135deg,#F58529,#DD2A7B,#8134AF)}
.link-icon.tt{background:linear-gradient(135deg,#69C9D0,#EE1D52)}
.link-icon.tel{background:linear-gradient(135deg,var(--sable),#8B7355)}

/* Text */
.link-text{flex:1;display:flex;flex-direction:column;gap:2px}
.link-title{
  font-family:'Syne',sans-serif;font-weight:700;
  font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--creme);
}
.link-desc{font-family:'Barlow',sans-serif;font-size:.7rem;color:var(--sable);opacity:.65;font-weight:300}

/* Arrow */
.link-arrow{
  font-family:'Syne',sans-serif;font-size:.72rem;color:var(--lime);
  opacity:0;transform:translateX(-6px);
  transition:all .3s;
}

/* Footer */
.card-footer{
  text-align:center;margin-top:28px;
  animation:fade-up .6s .7s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0;
}
.footer-tel{
  display:block;text-decoration:none;
  font-family:'Bebas Neue',sans-serif;
  font-size:1.4rem;letter-spacing:.06em;
  color:var(--blanc);margin-bottom:6px;
  transition:color .2s;
}
.footer-tel:hover{color:var(--lime)}
.footer-label{
  font-family:'Syne',sans-serif;font-size:.55rem;font-weight:600;
  letter-spacing:.25em;text-transform:uppercase;
  color:var(--sable);opacity:.4;
}

@keyframes fade-up{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
