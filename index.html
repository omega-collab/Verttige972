<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#2C1A0E;
  --bg-dark:#1A0F06;
  --bg-mid:#1E1408;
  --forest:#3B5323;
  --moss:#5A7A2C;
  --leaf:#8DB53D;
  --chain:#E8A020;
  --cream:#F4ECD8;
  --sand:#D9C49A;
}
html,body{height:100%;overflow-x:hidden}
body{
  font-family:'Lato',sans-serif;
  background:var(--bg);
  color:var(--cream);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
}

/* Noise texture */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='.06'/%3E%3C/svg%3E");
}

/* Tree rings */
.rings{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:0;pointer-events:none}
.ring{
  position:absolute;top:50%;left:50%;
  border-radius:50%;
  border:1px solid rgba(141,181,61,0.04);
  transform:translate(-50%,-50%);
  animation:ring-pulse 8s ease-in-out infinite;
}
.ring:nth-child(1){width:200px;height:200px;animation-delay:0s}
.ring:nth-child(2){width:340px;height:340px;animation-delay:1.2s}
.ring:nth-child(3){width:480px;height:480px;animation-delay:2.4s}
.ring:nth-child(4){width:620px;height:620px;animation-delay:3.6s}
.ring:nth-child(5){width:760px;height:760px;animation-delay:4.8s}
@keyframes ring-pulse{
  0%,100%{border-color:rgba(141,181,61,0.03);transform:translate(-50%,-50%) scale(1)}
  50%{border-color:rgba(141,181,61,0.08);transform:translate(-50%,-50%) scale(1.02)}
}

/* Decorative leaves */
.deco-leaf{position:fixed;pointer-events:none;opacity:.06;z-index:0}
.deco-leaf:nth-child(1){top:8%;left:6%;font-size:4.5rem;filter:blur(1px);transform:rotate(-25deg)}
.deco-leaf:nth-child(2){top:75%;right:8%;font-size:3.2rem;filter:blur(1.5px);transform:rotate(40deg)}
.deco-leaf:nth-child(3){bottom:12%;left:10%;font-size:5.5rem;filter:blur(2px);transform:rotate(15deg)}
.deco-leaf:nth-child(4){top:20%;right:12%;font-size:3.8rem;filter:blur(1px);transform:rotate(-55deg)}

/* Card */
.card{
  position:relative;z-index:1;
  width:340px;max-width:calc(100vw - 40px);
  background:linear-gradient(160deg,var(--bg-dark) 0%,var(--bg) 50%,var(--bg-mid) 100%);
  border:1px solid rgba(141,181,61,0.2);
  border-radius:4px;
  padding:36px 28px 32px;
  box-shadow:0 0 60px rgba(0,0,0,0.6);
  animation:card-in .8s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity:0;
}
@keyframes card-in{
  from{opacity:0;transform:translateY(30px) scale(0.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* Accent bar top */
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--forest),var(--chain),var(--leaf));
  border-radius:4px 4px 0 0;
}

/* Icon */
.icon-wrap{
  width:72px;height:72px;margin:0 auto 20px;
  border-radius:50%;
  background:radial-gradient(circle at 40% 35%,var(--leaf),var(--forest));
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  box-shadow:0 4px 20px rgba(141,181,61,0.2);
  animation:fade-up .6s cubic-bezier(0.16,1,0.3,1) forwards;
  animation-delay:.2s;opacity:0;
}

/* Header */
.card-name{
  font-family:'Oswald',sans-serif;font-weight:700;
  font-size:26px;letter-spacing:4px;text-align:center;
  color:var(--cream);
  animation:fade-up .6s cubic-bezier(0.16,1,0.3,1) forwards;
  animation-delay:.3s;opacity:0;
}
.card-sub{
  font-family:'Lato',sans-serif;font-weight:300;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  text-align:center;color:var(--leaf);margin-top:6px;
  animation:fade-up .6s cubic-bezier(0.16,1,0.3,1) forwards;
  animation-delay:.4s;opacity:0;
}

/* Separator */
.sep{
  display:flex;align-items:center;gap:12px;
  margin:22px 0 24px;
  animation:fade-up .6s cubic-bezier(0.16,1,0.3,1) forwards;
  animation-delay:.52s;opacity:0;
}
.sep-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(141,181,61,0.25),transparent)}
.sep-dot{font-size:8px;color:var(--chain);opacity:.6}

/* Buttons */
.links{display:flex;flex-direction:column;gap:12px;
  animation:fade-up .6s cubic-bezier(0.16,1,0.3,1) forwards;
  animation-delay:.64s;opacity:0;
}
.link-btn{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;border-radius:3px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(141,181,61,0.12);
  text-decoration:none;color:var(--cream);
  position:relative;overflow:hidden;
  transition:transform .25s,background .25s,border-color .25s;
}
.link-btn::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--leaf);transform:scaleY(0);
  transition:transform .25s;transform-origin:center;
}
.link-btn:hover{
  transform:translateX(4px);
  background:rgba(90,122,44,0.1);
  border-color:rgba(141,181,61,0.3);
}
.link-btn:hover::before{transform:scaleY(1)}
.link-btn:hover .link-arrow{opacity:1;transform:translateX(0)}

/* Icon circle */
.link-icon{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.link-icon svg{width:18px;height:18px;fill:#fff}
.link-icon.wa{background:radial-gradient(circle at 35% 30%,#1FAF38,#128C7E)}
.link-icon.web{background:radial-gradient(circle at 35% 30%,var(--leaf),var(--moss))}
.link-icon.ig{background:radial-gradient(circle at 35% 30%,#F58529,#DD2A7B,#8134AF)}
.link-icon.tt{background:radial-gradient(circle at 35% 30%,#25F4EE,#FE2C55,#000)}

/* Text */
.link-text{flex:1;display:flex;flex-direction:column;gap:2px}
.link-title{
  font-family:'Oswald',sans-serif;font-weight:600;
  font-size:13px;letter-spacing:2px;text-transform:uppercase;
  color:var(--cream);
}
.link-desc{font-size:10px;color:var(--sand);opacity:.7}

/* Arrow */
.link-arrow{
  font-size:14px;color:var(--leaf);
  opacity:0;transform:translateX(-8px);
  transition:opacity .25s,transform .25s;
}

/* Footer */
.card-footer{
  text-align:center;margin-top:28px;
  font-family:'Lato',sans-serif;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--cream);opacity:.3;
  animation:fade-up .6s cubic-bezier(0.16,1,0.3,1) forwards;
  animation-delay:.8s;opacity:0;
}

@keyframes fade-up{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* Fix footer opacity after animation */
.card-footer{animation-fill-mode:forwards}
</style>
